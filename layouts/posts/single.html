{{ define "title" }}{{ .Title }} — Tanner Mardis{{ end }}

{{ define "head" }}
<style type="text/css">
    .post-container {
        max-width: 720px;
        margin: 0 auto;
        padding: var(--space-xl) var(--space-s);
    }

    .post-nav {
        display: flex;
        align-items: center;
        gap: var(--space-m);
        margin-bottom: var(--space-xl);
        border-bottom: 1px solid var(--limegreen);
        padding-bottom: var(--space-m);
    }

    .post-nav img {
        max-width: 60px;
    }

    .post-nav a {
        color: var(--midgreen);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: var(--step-1);
        transition: color 0.2s ease;
    }

    .post-nav a:hover {
        color: var(--creme);
    }

    .post-header {
        margin-bottom: var(--space-xl);
    }

    .post-header h1 {
        color: var(--creme);
        margin-bottom: var(--space-xs);
    }

    .post-date {
        color: var(--midgreen);
        font-size: var(--step-1);
    }

    .post-content {
        color: var(--creme);
        line-height: 1.8;
    }

    .post-content h2,
    .post-content h3 {
        color: var(--limegreen);
        margin-top: var(--space-xl);
        margin-bottom: var(--space-s);
    }

    .post-content p {
        margin-bottom: var(--space-m);
    }

    .post-content a {
        color: var(--limegreen);
        text-decoration: underline;
        text-underline-offset: 3px;
    }

    .post-content a:hover {
        color: var(--creme);
    }

    .post-content ul,
    .post-content ol {
        margin-bottom: var(--space-m);
        padding-left: var(--space-l);
    }

    .post-content blockquote {
        border-left: 3px solid var(--limegreen);
        padding-left: var(--space-m);
        margin: var(--space-l) 0;
        color: var(--midgreen);
        font-style: italic;
    }

    .post-content code {
        background: var(--blackgreen);
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 0.9em;
    }

    .post-content pre {
        background: var(--blackgreen);
        padding: var(--space-m);
        border-radius: var(--space-2xs);
        overflow-x: auto;
        margin-bottom: var(--space-m);
    }

    .post-content pre code {
        background: none;
        padding: 0;
    }
</style>
{{ end }}

{{ define "body" }}
<div class="post-container">
    <div class="post-nav">
        <a href="/"><img src="/images/logo-white.svg" alt="Tanner Mardis Logo" /></a>
        <a href="/posts">&larr; All Posts</a>
    </div>
    <div class="post-header">
        <h1>{{ .Title }}</h1>
        <p class="post-date">{{ .Date.Format "January 2, 2006" }}</p>
    </div>
    <div class="post-content">
        {{ .Content }}
    </div>
</div>
{{ end }}
