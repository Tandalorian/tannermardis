{{ define "title" }}Tanner the Mardis{{ end }}

{{ define "head" }}
<script type="application/ld+json">
    {
        "@context": "http://schema.org",
        "@type": "WebSite",
        "name": "Tanner Mardis",
        "url": "https://tannermardis.com",
        "creator": {
            "@type": "Organization",
            "name": "Mardis Studio",
            "url": "https://mardis.studio",
            "description": "Designed and developed by Tanner the Mardis."
        }
    }
</script>
<link rel="preload" href="/images/tm-blank.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-book.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-coffee.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-design.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-jedi.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-photo.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-twitter.webp" as="image" type="image/webp"/>
<link rel="preload" href="/images/tm-work.webp" as="image" type="image/webp"/>
<style type="text/css">
    .container {
        padding: var(--space-s);
        margin: 0px;
        display: grid;
        grid-template-columns: 1fr 4fr 2fr;
        gap: var(--space-s);
        height: 100dvh;
    }
    aside {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--space-l);
        border: 1px solid var(--limegreen);
        border-radius: var(--space-2xs);
        padding: var(--space-l);
    }
    aside img {
        max-width: 100px;
    }
    aside h1 {
        margin: 0;
        color: var(--midgreen);
        writing-mode: vertical-rl;
        font-size: 5vh;
    }
    main {
        border: 1px solid var(--limegreen);
        border-radius: var(--space-2xs);
        background: url("/images/tm-blank.webp");
        background-size: cover;
        background-position: center center;
        transition: background 0.3s ease-in-out;
        order: 1;
    }

    @media (max-width: 800px) {
        .container {
            display: grid;
            grid-template-columns: 1fr;
        }
        aside h1 {
            writing-mode: horizontal-tb;
        }
        main {
            aspect-ratio: 1;
        }
    }
</style>
{{ end }}

{{ define "body" }}
<div class="container">
    <aside>
        <img src="/images/logo-green.svg" alt="Tanner Mardis Logo" />
        <h1>Tanner the Mardis</h1>
    </aside>
    {{ partial "nav.html" (dict "iconsOnly" false) }}
    <main role="img" aria-label="Tanner Mardis background preview"></main>
</div>
{{ end }}
