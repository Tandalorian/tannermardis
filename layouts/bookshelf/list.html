{{ define "title" }}Tanner's Bookshelf{{ end }}

{{ define "head" }}
<style type="text/css">
    :root {
        --1: #ffffff;
        --2: #e0dfdb;
        --3: #7f7f80;
        --4: #222222;
        --5: #3b3b3b;
        --6: #111111;

        --shadow-color: 44deg 8% 20%;
        --shadow-elevation-low:
            0px 0.2px 0.2px hsl(var(--shadow-color) / 0.39),
            0px 1px 1.2px -1.9px hsl(var(--shadow-color) / 0.51);
        --shadow-elevation-medium:
            0px 0.2px 0.2px hsl(var(--shadow-color) / 0.36),
            0px 1.3px 1.6px -0.9px hsl(var(--shadow-color) / 0.44),
            0.1px 4.8px 5.8px -1.9px hsl(var(--shadow-color) / 0.51);
        --shadow-elevation-high:
            0px 0.2px 0.2px hsl(var(--shadow-color) / 0.4),
            0px 2.7px 3.3px -0.5px hsl(var(--shadow-color) / 0.45),
            0.1px 5.9px 7.2px -0.9px hsl(var(--shadow-color) / 0.51),
            0.2px 12.2px 14.8px -1.4px hsl(var(--shadow-color) / 0.56),
            0.3px 23.7px 28.8px -1.9px hsl(var(--shadow-color) / 0.61);

        --shelf:
            url("/images/noise.png"),
            linear-gradient(
                0deg,
                rgba(72, 70, 58, 1) 0%,
                rgba(82, 80, 78, 1) 25%,
                rgba(62, 60, 58, 1) 100%
            );
        --back:
            url("/images/noise.png"),
            linear-gradient(
                0deg,
                rgba(72, 70, 68, 1) 0%,
                rgba(112, 110, 108, 1) 25%,
                rgba(112, 110, 108, 1) 75%,
                rgba(52, 50, 48, 1) 100%
            );
    }

    html {
        background: var(--4);
        background-image: url("/images/noise.png");
    }

    body {
        display: flex;
        justify-content: center;
    }

    .bookcase {
        justify-self: center;
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: center;
        border: 24px solid var(--2);
        border-bottom: 0px;
        border-radius: 4px;
        padding: 0px 0px;
        max-width: 1300px;
    }

    .topshelf {
        height: 200px;
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
        background: var(--4);
        background-image: url("/images/noise.png");
        border-bottom: 24px solid var(--2);
    }

    .bookwrap {
        height: clamp(350px, 40vh, 500px);
        width: clamp(200px, 20vw, 300px);
        border-bottom: 24px solid var(--2);
        background-image: var(--back);
        display: flex;
        flex-grow: 1;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding: 0px;
        margin: 0px;
        perspective: 800px;
        perspective-origin: left center;
    }

    .bookwrap::after {
        content: "";
        height: 48px;
        width: 100%;
        background-image: var(--shelf);
    }

    .book {
        width: 150px;
        min-height: 150px;
        background: var(--6);
        position: relative;
        bottom: -24px;
        margin: 0px;
        box-shadow: var(--shadow-elevation-medium);
        transition: all 0.2s ease-in-out;
    }

    .book:hover {
        box-shadow: var(--shadow-elevation-high);
        transform: rotateX(0deg) rotateY(-20deg) scale(1.08);
        transform-style: preserve-3d;
    }

    .book img {
        border: 1px solid var(--6);
    }
</style>
{{ end }}

{{ define "body" }}
<div class="bookcase">
    <div class="topshelf">
        <a href="/"><img class="logo" src="/images/logo-white.svg" /></a>
        <h1>Tanner's Bookcase</h1>
        <p></p>
    </div>
    {{ range hugo.Data.books }}
    <div class="bookwrap">
        <div class="book">
            <img src="{{ .cover }}" alt="{{ .title }} by {{ .author }}" />
        </div>
    </div>
    {{ end }}
</div>
{{ end }}
